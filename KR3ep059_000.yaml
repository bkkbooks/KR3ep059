炒桃仁一錢五分白茯苓五錢代赭石三錢炒當歸二錢炒丹皮一錢五分炒蒲黃一錢五分煅禹糧三錢炒川芎一錢炒山楂三錢旋覆花二錢炒五靈脂去砂石一錢五分案徐常州思慮憂鬱精神未能痛快氣機不獲展舒胸宇既悶咽間如有物阻咯不出咽不下當悗悶不適時肢亦清厥然志樂氣爽則又無恙脈濡弦當以愈快精神為主參以宣氣解鬱可也炒豆豉二錢法半夏一錢五分泡射干一錢金石斛二錢焦山梔一錢二分全瓜蔞三錢山豆根一錢五分旋覆花二錢緑萼梅八分白茯苓三錢川玉金一錢五分代代花七朵案陳先生清陽單薄健運無力四肢清厥啜粥為安啖飯缺適脘中有時不舒然難鳴狀久坐起立頭腦旋運閉目少選即瘥頭為諸陽之會四肢為諸陽之末脈濡緩而弦仍以健脾和陽可也淮黃耆二錢炙防風一錢炒白朮一錢五分炒白芍二錢川桂枝八分白茯苓三錢益智仁一錢巴戟天一錢五分炒杞子二錢白蒺藜三錢橘紅衣一錢宣木瓜錢案胡寧波路肺葉久壞裂痕已深如爛瘡如漏管痰濁穢惡雖弭而咯血歷久不瘥或盈口而出或與痰相雜而出高臥較安平臥較甚脈尚平靜面亦清亮不然殆已久矣白芨末六分甜三七末沖四分合歡皮四錢炒地榆三錢仙鶴草三錢淮膝炭二錢海蛤粉三錢淡秋石一錢五分飛青黛八分藕節炭四錢絲瓜絡帶子三錢白綿紙燒炭研沖三十張蒲黃炒阿膠三錢案何右老北門膈症至於結腸胃脘枯槁難為力大便十餘日不下下流不通勢必上泛然形瘦見骨起立維艱恐非藥石所能愈耳昨曾嘔出蛔蟲猶慮厥變旋覆花二錢法半夏一錢五分新紅花八分烏梅肉六分閉口川椒紅三分泡吳茱萸八分玉蘇子二錢枳實皮一錢五分桃仁一錢五分炒胡黃連一錢光杏仁三錢又二診胃脘枯槁至於結腸勢難挽救昨日大便雖通下燥糞甚夥尚仍嘔吐形瘦見骨色萎不澤脈空弦而澀膈症至此徒喚奈何勉方聊盡心力而已旋覆花二錢仙半夏二錢金石斛二錢無花果二錢蒸當歸二錢橘紅衣一錢茯苓三錢杏仁三錢蘇子二錢炒枳殼一錢五分炒穀芽五錢緑萼梅八分案霖公心胸作嘈腹中隱隱乍痛大便稍帶黏積頭腦昏蒙巔頂尤缺清爽口甘溺赤脈緩微弦面黃暗不澤肝脾疏運失司血質有衃敗之漸不可以尋常傷濕比擬也澤蘭葉三錢炒當歸二錢黑川芎八分蒸於術一錢五分益智仁一錢白茯苓三錢白蒺藜三錢法半夏一錢五分白蘚皮二錢旋覆花二錢大丹參二錢案李九畝地據述大便漆黑惡物難弭而腹痛未除下利未已今晨且作厄忒夜寐不安肝脾久傷積衃暴動深慮脾憊脫變仍擬疏肝運脾推陳致新制禹糧三錢赤石脂三錢蘇木屑一錢炒川芎八分益智仁一錢白茯苓三錢泡吳萸八分煨肉果一錢旋覆花二錢代赭石三錢真降香一錢刀豆子三錢厚朴花一錢五分制沒藥一錢案鄭恆慶里精神虛弱愈虛弱而愈不寧不寧則氣機之運用腸胃之傳導變化均乖亂失常脘腹否悶噯氣頻仍便溏不爽夜寐不安咽間梗塞脈濡弦舌後光截花剝既糙且膩和調腑臟安寧精神可也金石斛二錢炒白芍二錢益智仁一錢石菖蒲六分法半夏一錢五分北秫米三錢白茯苓三錢山豆根一錢五分制禹糧三錢御米殼一錢五分刀豆殼三錢橘紅衣一錢旋覆花二錢案周南市環臍少腹繃急而痛痠墜不舒便溏日有數起未能爽適形瘦脈弦搏食難運化或欲作嘔咳嗽少寐多汗仍有寒熱肺勞腸勞並病殊不易調如不節飲食慎啖更難療治青蒿三錢苡仁三錢茯苓三錢金石斛三錢炙雞金二錢炙蟾皮量缺佩蘭二錢白芍二錢六曲二錢新紅花八分使君子一錢五分陳大麥炒杵三錢石榴根皮六分案屠望平街惡寒乍熱已減退肛脹大便欲解不解左胯脹痛腰部拘急屈而不伸左睪丸偏墜腫痛色仍赤惟焮熱較減精濁瘀滯腑氣閉塞再以通腑輸精以消丸腫煅貝齒三錢油當歸三錢光杏仁三錢新紅花八分炒枳實皮一錢五分郁李仁三錢炒青皮一錢五分瓜蔞仁三錢劉寄奴一錢五分炒丹皮一錢五分炒橘核一錢五分棠球子炒三錢穿山甲二錢杜牛膝根三錢又二診熱已減退腰脊亦能直伸左睪丸偏墜腫痛牽及鼠蹊胯內色仍赤惟焮熱略減皮已轉皺脈弦精濁瘀滯未輸仍以通泄此囊腫之屬為日已久殊防外潰潰則難斂煅貝齒三錢油當歸三錢炒山楂核三錢炒丹皮一錢五分劉寄奴一錢五分光桃仁一錢五分新紅花八分炒青皮一錢五分象貝母三錢全瓜蔞三錢穿山甲三錢乾地龍一錢五分滋腎丸吞一錢五分仙遺糧五錢西血珀四分研末蜜丸吞又三診敗精腐瘀已漸輸出左睪丸偏墜焮赤漸退腫痛漸消但未消盡鼠蹊舒適囊皮已蛻脈來緩和病機向瘳仍守原意小其制煅貝齒三錢劉寄奴一錢五分西血珀蜜丸吞四分紅花八分丹皮一錢五分象貝三錢忍冬藤三錢海蛤粉三錢絡石藤五錢白茯苓三錢炒山楂核三錢炒橘核二錢案郭天津路肝者中之將也病失疏泄血亦瘀滯肝脈貫鬲上及頏顙故肝氣亢害未有不侮胃纍腦者侮胃不過氣逆纍腦則血不行矣卒然發厥如痧脹之狀愈發愈促愈促愈劇脈弦治以疏達調通旋覆花二錢緑萼梅八分炒丹皮一錢五分白蒺藜三錢法半夏二錢白茯苓三錢川玉金一錢五分澤蘭葉三錢炒白芍二錢佛手柑一錢金石斛二錢明天麻八分案鄭四馬路年屆六旬肝腎內虧頭眩耳鳴目花舉步浮蕩神疲懶於言語語言欲出忽蹇此皆根蒂有虧之證為厥中根萌脈弦滑議以河間法炒熟地四錢山萸肉炒去核二錢潼沙苑三錢淮牛膝二錢甘杞子二錢滁菊花一錢五分金石斛三錢抱木神三錢野料豆三錢女貞子三錢炙龜板五錢煅決明四錢案胡拋球場黃疸有年肝脾疏運失司膽汁瘀滯結成窠囊腸之回旋受障礙而失舒腹右膨脹痞塞噯氣不爽喜以手推蕩但推蕩著力太過則有小腸氣之纍勿取一時之快也近日大便下黃水頗適仍守原意毋事更張厚朴花一錢五分炒枳殼一錢五分佩蘭葉三錢左秦艽一錢五分法半夏二錢白茯苓三錢白蘚皮二錢沉香曲一錢五分蒲公英三錢白芥子八分新紅花八分旋覆花二錢煅銅針砂三錢煎水代湯案胡拋球場精髓不充囟門薄弱鼻塞未能爽適臥著則塞記憶善忘注目久視則𥉂𥉂無所見治以補精益腦潼沙苑三錢甘菊花一錢五分蔓荊子一錢五分橘紅衣一錢煅決明四錢淮黃耆三錢益智仁一錢荷葉筋三錢炒杞子二錢炙防風一錢茯苓三錢案胡右績溪年前産難胞脈內傷胞脈屬心心主血汗即心之液煩勞即背脹多汗汗泄於夜寢既覺之後心臟之虛亦受胞脈之影響也照述擬以養心調榮淮黃耆三錢蒸歸身二錢金石斛三錢抱木神三錢肥玉竹二錢炙甘草一錢大丹參二錢青龍齒三錢炒白芍二錢甘杞子三錢炒白薇二錢淮小麥三錢陳南棗三枚案李右心臟舒縮較前稍緩亦不歇止惟乍疏乍數之象未改日前已覺安適昨啖芋艿滯氣生痰肝脾疏運失司胃氣翳滯不行脘腹繃脹而痛按之堅硬蓋胃體之繃脹也足肢以上俱腫環臍少腹按之𪔣𪔣然不堅按腹脹身盡腫皮膚厚色蒼黃經旨以為膚脹此氣分為病與水分有別經事之後繼以黃濁惡物胞脈屬心與膚脹無甚關係與心臟病有干也先從膚脹治法如木香流氣飲廣木香一錢制川朴一錢五分炒青皮一錢新會皮一錢五分洗腹皮二錢帶皮苓五錢白豆蔻八分縮砂仁八分光杏仁三錢蘇梗一錢五分桑皮炙一錢五分佛手一錢改方加煨莪朮一錢
