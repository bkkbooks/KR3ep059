body:
  text: 正文案汪唐家弄喉痛懸壅下垂喉壁仍纍纍高起如疱丁咯痰艱澀不利交睫夢夢惚惚至夜則足肢微浮形瘦面黧脈沉澀數腎陰不上承肺氣不肅降有水竭金枯之虞海蛤粉三錢川貝母一錢五分生苡仁三錢野薔薇花二錢飛青黛三錢白茯苓三錢冬瓜子五錢干葦莖三錢金石斛三錢絲瓜絡三錢肥知母三錢枇杷葉三錢案王十六浦肝膽氣橫阻遏胃降飲食所入勢必嘔出昨日嘔甚吐苦氣仍逆而不已嘔劇將咽頭胃絡嘔破以致血與食物並出咽中痛脈弦治以疏肝降胃兼泄少陽切莫見血投涼玉蘇子二錢旋覆花二錢法半夏一錢五分炒枳殼一錢五分真降香八分代赭石二錢全瓜蔞三錢白茯苓三錢川蒲黃一錢五分嫩前胡一錢五分炒川連三分澤蘭葉三錢又二診肝阻胃降嘔逆過甚將咽頭震破致血與食並出咽中痛投降胃血止嘔平但頭腦仍眩體疲乏力向有腦漏偏著左邊脈弦腦漏鼻淵亦膽熱上移也旋覆花二錢炒條芩一錢絲瓜絡二錢夏枯花三錢法半夏一錢五分冬桑葉二錢金石斛三錢炒蒲黃一錢五分白茯苓三錢炒丹皮一錢五分白蒺藜三錢辛夷花一錢案陳澉浦陽升太過清竅空脈絡之血難以下趨血走清道鼻衄來如湧湧日屢見不一見絡血由裂傷而出如走熟徑也治當引陽入陰安寧督脈俾陽絡之血不至妄行可耳仙鶴草三錢煅龍齒三錢血餘炭六分丹參二錢絲瓜絡二錢淮牛膝二錢旱蓮草三錢煅決明四錢生地黃四錢丹皮一錢五分金石斛三錢胡麻三錢荷葉筋三錢白茅根肉二錢煅龍骨一錢五分五倍子五分血餘炭五分上三味研末以墨紙頭蘸末楔鼻孔案金童平湖肺主氣心主血心肺相依為用所謂平人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一晝夜凡一萬三千五百息八十一丈周於身肺氣為病心血不清痧疹一發再發留邪不達氣化有阻面目肢體盡腫頸項亦腫呼吸深則胸脅中痛小溲短少水道不通亦氣化之不下輸也若蔓延深入必至肺脹喘閉則惡矣桑白皮一錢五分紫背浮萍二錢連翹殼三錢陳赤豆四錢光杏仁三錢帶皮茯苓六錢生苡仁三錢路路通六枚通草一錢冬瓜皮四錢橘紅衣一錢又二診氣化漸見下輸面目手肢浮腫較退小溲略長惟腹部仍有繃狀鼻竅稍見衄血手肢及腦部發瘰痧疹之餘毒未清守原意廓清之桑白皮一錢五分紫背浮萍一錢五分連翹二錢夏枯草二錢炒丹皮一錢五分連皮苓三錢苡仁三錢陳赤豆三錢紫地丁三錢忍冬藤三錢杏仁三錢路路通二錢案邵右武定路産育多胞胎脈內損榮血有虧頭眩目視少神背膂脹痛胸宇氣悶不舒入夜掌跖炎熱煩勞則下惡露紅黃雜見脈弦澀胞脈失固殊防崩漏腹中或痛而熱則肝氣不舒氣有餘便是火故雖熱而痛也治以舒氣調榮兼固胞脈緑萼梅八分丹參二錢元胡索一錢五分烏賊骨三錢炒白芍二錢白薇二錢金鈴子一錢五分紅白雞冠花各一錢白蒺藜三錢茯苓三錢川續斷二錢煅牡蠣三錢又二診肝氣不舒榮絡失和右腰肋內脈牽引而痛咳嗽行動坐臥轉側或作拘急脈弦澀治以舒氣機調榮脈方缺案李右唐家弄經隧不通胞絡恆閉少腹兩旁有癖近日咳嗆見輕偏左腿肢腰胯酸脹而痛筋掣微麻舌後半截難過弗爽莫能名狀胞脈屬心心主一身之血脈又絡於舌脈弦澀仍以通絡行血可也大丹參二錢元胡索二錢炒丹皮一錢五分乾地龍一錢五分澤蘭葉三錢炒續斷二錢白茯苓三錢炒茜根一錢五分茺蔚子三錢藏紅花四分白蒺藜三錢功勞葉三錢案潘右嘉善右肩髃疼痛筋骨拘急機關不利臂難上舉仲景云但臂不遂者為痹惟脈不浮數而弦滯經事又復失調當以行血舒筋以利機關片薑黃一錢五分伸筋草二錢藏紅花四分抱木神三錢天仙藤一錢五分全當歸三錢雞血藤膠一錢桑寄生三錢威靈仙一錢五分左秦艽一錢五分白蒺藜三錢功勞葉三錢路路通八枚案欣右虹口腹痛腸鳴便瀉食難運化形瘦色夭不澤月事已兩月不來舌光絳如豚肝日有寒熱間有咳嗽脈濡弦真元已傷胞脈已閉腸胃脂肪剝蝕殆盡病勢已深生氣索然外將浮腫難以療治矣蒸於術一錢制禹糧三錢茯苓三錢宣木瓜一錢炒白芍二錢煅牡蠣三錢青蒿二錢金石斛三錢益智仁八分御米殼一錢五分苡仁三錢炒穀芽五錢案陸右火為風搏鬱而不宣喉痛咽腫懸壅下垂嗓音窒咽不揚肢清形寒脈浮數稍有咳嗽治以清宣利咽連翹二錢薄荷三分炒殭蠶一錢五分生甘草一錢銀花三錢元參二錢紫荊皮二錢薔薇花瓣三錢射干一錢馬勃一錢玉桔梗八分牛蒡子一錢五分案汪崑山血瘀在絡左背胛酸楚起及於肘腋胠脅既則右背部胸膺亦然內著於骨故按之痛少止然不能臥臥則痛甚胸臆氣悶不舒呼吸亦感不快脈弦澀心主一身之血脈此亦脈痹之屬絡病難治漸痹漸痼則尤難治矣姑以宣通仙鶴草三錢抱木神三錢大丹參二錢澤蘭葉三錢藏紅花四分制沒藥一錢忍冬藤三錢乾地龍二錢片薑黃一錢五分制乳香一錢絡石藤三錢路路通八枚案胡左績溪臟脈精華皆上注於目諸脈亦屬於目目得血而能視肝腎精血內虧精氣無力上注緑水泛入瞳人之內瞳人散大與黑珠風輪相渾色如珠母始初僅在右目上年以來並及左目但稍輕耳脈濡弦而澀尺部稍藏瞽者善聽聽覺又缺聰腎臟精氣之衰亦可見矣藥餌不外乎補精益氣但功效甚微耳淡蓯蓉三錢大熟地五錢甘枸杞二錢覆盆子三錢淮牛膝二錢山萸肉三錢女貞子三錢金毛狗脊二錢金石斛二錢潼沙苑三錢南燭子三錢決明子二錢穀精草三錢兔肝焙乾研細末沖一錢磁朱丸一錢五分吞案王勞勃生路飲食入胃以傳於肺肺苦氣逆變動為咳水穀精液釀痰而不生血咳嗽痰沫多咳劇震動肺絡則痰紅雜出近日足肢浮腫周行氣化有阻脈弦滑左搏苔黃口苦膽汁亦因震動而暗泄也治以清絡保肺兼泄少陽霜桑葉二錢茯苓三錢旋覆花二錢炙紫菀一錢五分粉丹皮一錢五分苡仁三錢蒲公英三錢玉蘇子二錢絲瓜絡三錢杏仁三錢炙兜鈴錢二分又二診足肢浮腫見消氣逆咳嗆仍劇未減痰多不易咯出日來仍帶紅少許脈弦左搏口苦苔黃且增嘔惡飲食隨痰涎嘔出蓋肺氣失宣胃逆失降膽汁亦逆流而上也惟年老病久未可泛泛視之方缺案劉麥家圈舊有失血近又復萌咳嗆喉間殊缺清爽日來痰中尚帶血星陰精有虧肺氣燥逆據云咳出之血亦有沉水者此蓋離絡忍而後出也肺絡之傷則毫無疑義若以入水浮沉為斷則陋矣海蛤粉三錢大丹參二錢金石斛三錢旱蓮草三錢甜三七八分粉丹皮一錢五分南沙參三錢藕節四錢生苡仁三錢絲瓜絡三錢炒茜根一錢五分案陳吳江呼出屬肺吸入屬腎腎氣有傷攝納無力肺苦氣逆咳嗽喘急不能安枕矣腰痠形瘦脈濡弦寐覺汗泄肺為氣出入之道其本在腎其末在肺納下為主復以宣上但宜節欲遠房帷為要否則難治鵝管石一錢淮牛膝二錢白茯苓三錢款冬花一錢五分遠志肉一錢海蛤粉三錢御米殼一錢五分銀杏肉六枚冬蟲草一錢二分法半夏一錢五分蒸百部八分蛤蚧尾三分剝鱗研沖案李右虹口産後胞脈損傷惡露纏綿帶下淋瀝腰痠脅痛延日已久近忽崩中噴湧而至有瘀塊甚夥頭眩心悸足膝痠軟脈弦澀而數治以鎮攝炒續斷二錢炒貫衆一錢五分甘杞子三錢炒條芩一錢二分炒地榆三錢煅牡蠣三錢女貞子三錢烏賊骨三錢白蒺藜三錢煅龍骨三錢當歸頭二錢白紅雞冠花各一錢震靈丹一錢五分吞案米崑山咳嗽喘閉氣候寒暄失常必發且劇喉間有聲臥難安枕唾皆白沫轉黃濃則少瘥脈滑以溫藥和之麻黃根四分北細辛二分淡乾薑一分佛耳草一錢五分射干一錢二分法半夏一錢五分鼠黏子同杵一錢五分蒸百部八分光杏仁三錢白茯苓三錢甜葶藶隔紙炒一錢炙款冬一錢五分炙桑白皮一錢五分案陳西門濕滯相搏腸府為病腹痛下利紅白裡急肛脹痛則汗泄脈弦舌苔灰白而膩治以導滯通腑制川朴檳榔炒條芩炒銀花炒枳殼菖蒲炒貫衆萊卜甲廣木香佩蘭六神麯炒楂餅案鄭精氣為體魄之本精譬若薪也氣譬若火也有形之精薄弱無形之氣未有能獨旺者也小溲注射乏力便後偶感精氣滲泄治當固其腎命強陰壯陽淮耆三錢淮牛膝二錢陽起石一錢葫蘆巴二錢於術三錢淡蓯蓉三錢煨鹿角三錢補骨脂二錢茯苓五錢鎖陽三錢巴戟肉二錢上安桂一錢五分又二診腎間動氣為生氣之本三焦之原難經謂之命門道經謂之丹田內經所謂七節之旁中有小心徐洄溪謂陰陽翕闢存乎此呼吸出入系乎此無火而能令百體皆溫無水而能令臟腑皆潤其寶貴重要有如此者今小溲澀少陽根注射無力是精氣虛乏元陽式微若再滲瀉分利將有精竭陽熄之患況久立行動自覺有氣促腿肢墜下納食則腹笥作脹亦有欲墜之狀命陽微弱腎難收攝益昭然若揭矣茲擬補精納氣溫陽化氣緣腎命以氣為主也淡蓯蓉三錢淮牛膝二錢潼沙苑三錢生於術二錢巴戟天二錢甘杞子二錢補骨脂二錢蛤蚧尾四分葫蘆巴二錢菟絲子三錢淮耆劑量缺金匱腎氣丸三錢案劉左膽附於肝肝氣盛強少火變化壯火膽應清靜而不清靜胃當下降而不下降以致胸脘痞塞煩悶喜太息時欲嘔甚則嘔惡酸苦苔黃口苦而燥夜不得寐欲寐或作驚惕即經旨胃不和則臥不安也脈弦數擬溫膽湯意泄木安胃為主法半夏一錢五分川條芩一錢一分旋覆花二錢天花粉三錢白茯苓四錢金石斛二錢炒白芍二錢北秫米四錢炒枳殼一錢五分橘紅衣一錢蒲公英三錢二竹茹二錢案姚虹口濕熱不攘腎臟精氣內奪腦筋氣力不周手肢足肢痠非扶掖不能起立舉步張口言語唇吻即向左喎鼻竅中前有血出耳失聰而脹日來又聲沙音低昨復交捷汗泄病經草餘日雖起於外因實涉於腎與腦痿厥是慮尤恐腦筋之迸裂也左秦艽一錢五分白蒺藜三錢桑寄生二錢夜交藤四錢鹿銜草二錢淮牛膝二錢巨勝子三錢左牡蠣三錢金石斛三錢炒川柏一錢二分白茯苓三錢明天麻一錢忍冬藤三錢功勞葉二錢又二診腎臟精氣內奪腦筋力量不贍手麻足痠起立舉步殊難自立耳失聰而脹聲音咽而澀交睫汗泄見戢張口言語唇向左喁亦稍見瘥鼻血已止尿管乍痛脈來弦澀濕熱不攘乃發病之誘因也仍當強腎益腦再俟機宜連藤首烏五錢金石斛三錢潼沙苑三錢左牡蠣三錢蒸淮牛膝三錢巨勝子三錢炒黃柏一錢炙龜板五錢川厚杜仲三錢炒杞子二錢楮實子二錢炙遠志一錢十大功勞葉三錢明天麻一錢案葉童燥為風搏留於肺系咳嗽一咳而連咳不已是為頓咳俗名百日咳也面微浮但咳劇亦令喉膜破碎血從口鼻出者且以輕宣潤降舊有疳積稍為兼顧炙桑皮一錢炙兜鈴一錢蒸百部八分清炙草八分泡射干八分生苡仁三錢佛耳草一錢使君子肉一錢五分光杏仁三錢脆白前一錢五分玉蘇子一錢五分白茯苓三錢案姚右肝氣亢害肝血失榮腹脹時脹時愈十餘日來氣上衝胸迫動神經屢經發厥厥時手舉搐搦心悸亢進厄逆輒呵缺脈弦滯勢恐成癇難愈制磁石三錢石菖蒲八分炒白薇三錢冬桑葉二錢代赭石二錢明天麻一錢炒白芍二錢炒丹皮一錢五分白茯苓三錢雙鉤藤二錢白蒺藜三錢炙遠志一錢仙半夏一錢五分又二診腦力安靜肝亢較和厥搐獲愈心悸厄逆呵缺俱平腹脹胸悶皆已舒適脈濡緩此時完好無恙舒筋調榮可也法半夏炒白芍香白薇炒丹皮明天麻白蒺藜緑萼梅茺蔚子蒸歸身金石斛冬桑葉白茯苓案金嗜飲酒醴喜吸香烟足令陽強陰耗